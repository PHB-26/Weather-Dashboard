<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

   
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

     
        <header>
            <h1><i class="fa-solid fa-cloud-sun"></i> Weather Dashboard</h1>

            <button id="themeBtn" title="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>

     
        <section class="search-section">

            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name">

            <button id="searchBtn">
                <i class="fa-solid fa-magnifying-glass"></i>
                Search
            </button>

            <button id="locationBtn">
                <i class="fa-solid fa-location-crosshairs"></i>
                Current Location
            </button>

        </section>

        <div id="loading" class="loading hidden">

            <div class="loader"></div>

            <p>Fetching latest weather...</p>

        </div>

  
        <div id="errorMessage" class="error hidden">

            City not found.

        </div>

       
        <section class="current-weather">

            <div class="city-details">

                <h2 id="cityName">City Name</h2>

                <p id="currentDate">Date & Time</p>

            </div>

            <div class="weather-overview">

                <div class="left">
            
                    <h1 id="temperature">--°C</h1>
            
                </div>
            
                <div class="right">
            
                    <h2 id="weatherCondition">☀️ Clear</h2>
            
                </div>
            
            </div>

        
            <div class="weather-cards">

                <div class="card">

                    <i class="fa-solid fa-temperature-half"></i>

                    <h3>Feels Like</h3>

                    <p id="feelsLike">--°C</p>

                </div>

                <div class="card">

                    <i class="fa-solid fa-droplet"></i>

                    <h3>Humidity</h3>

                    <p id="humidity">--%</p>

                </div>

                <div class="card">

                    <i class="fa-solid fa-wind"></i>

                    <h3>Wind Speed</h3>

                    <p id="windSpeed">-- km/h</p>

                </div>

            </div>

        </section>

   
        <section class="forecast">

            <h2>7-Day Forecast</h2>

            <div id="forecastContainer" class="forecast-container">

                

            </div>

        </section>

    </div>
    <script src="weather-icons.js"></script>
    <script src="script.js"></script>

</body>

</html>
